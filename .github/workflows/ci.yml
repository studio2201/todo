name: Rust CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: Continuous Integration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache Cargo Dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: "rustdo-ci-cache"

      - name: Enforce Formatting
        run: cargo fmt --all --check

      - name: Run Clippy (Deny Warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Install Trunk
        run: |
          mkdir -p bin
          wget -qO- https://github.com/trunk-rs/trunk/releases/download/v0.21.14/trunk-x86_64-unknown-linux-gnu.tar.gz | tar -xzf- -C bin
          echo "$GITHUB_WORKSPACE/bin" >> $GITHUB_PATH

      - name: Build WASM Frontend
        working-directory: frontend
        run: trunk build --release

      - name: Build Backend & shared
        run: cargo build --release --workspace --exclude frontend
