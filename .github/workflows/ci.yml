name: CI

on:
  push:
    branches: [ "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "master" ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: wasm32-unknown-unknown

      - name: Install Trunk
        run: wget -qO- https://github.com/trunk-rs/trunk/releases/download/v0.21.3/trunk-x86_64-unknown-linux-gnu.tar.gz | sudo tar -xzf- -C /usr/local/bin

      - name: Install wasm-bindgen-cli
        run: wget -qO- https://github.com/wasm-bindgen/wasm-bindgen/releases/download/0.2.121/wasm-bindgen-0.2.121-x86_64-unknown-linux-musl.tar.gz | sudo tar -xzf- --strip-components=1 -C /usr/local/bin


      - name: Build Frontend
        working-directory: frontend
        run: trunk build --release

      - name: Cargo Check
        run: cargo check --workspace

      - name: Cargo Test
        run: cargo test --workspace

  alpine-build:
    name: alpine-build
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Alpine container
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: false
          load: true
          tags: todo-alpine:test
          platforms: linux/amd64

      - name: Smoke test (root URL responds 200)
        run: |
          docker run --rm -d --name todo-smoke -p 8080:4403 todo-alpine:test
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:8080/" >/dev/null 2>&1; then
              echo "root URL check passed"
              docker stop todo-smoke
              exit 0
            fi
            sleep 2
          done
          echo "root URL check failed after 60s"
          docker logs todo-smoke || true
          docker stop todo-smoke
          exit 1


  build-and-push-container:
    name: build-and-push-container
    runs-on: ubuntu-latest
    needs: [build-and-test, alpine-build]
    if: github.event_name == 'push' &&
      (github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    permissions:
      packages: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
