name: "Build & Publish Docker Image (CD)"

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORMS: linux/amd64

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      # Log in to GitHub Container Registry (GHCR)
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Optionally log in to Docker Hub if credentials are provided
      - name: Log in to Docker Hub
        if: ${{ secrets.DOCKER_USERNAME != '' && secrets.DOCKER_PASSWORD != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract version from backend/Cargo.toml
        id: package_version
        run: |
          VERSION=$(grep -m 1 '^version = ' backend/Cargo.toml | cut -d '"' -f 2)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Generate Docker Metadata
        id: meta
        run: |
          LOWER_IMAGE_NAME_GHCR=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          LOWER_IMAGE_NAME_DOCKER=$(echo "ubermetroid/rustdo" | tr '[:upper:]' '[:lower:]')
          VERSION=${{ steps.package_version.outputs.VERSION }}
          
          # Initialize tags list
          TAGS=""
          
          # Add GHCR tags
          TAGS="${TAGS}${LOWER_IMAGE_NAME_GHCR}:${VERSION}"
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            TAGS="${TAGS},${LOWER_IMAGE_NAME_GHCR}:latest"
          elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
            TAGS="${TAGS},${LOWER_IMAGE_NAME_GHCR}:dev"
          fi
          
          # Add Docker Hub tags (if credentials exist)
          if [ "${{ secrets.DOCKER_USERNAME }}" != "" ]; then
            TAGS="${TAGS},${LOWER_IMAGE_NAME_DOCKER}:${VERSION}"
            if [ "${{ github.ref }}" = "refs/heads/main" ]; then
              TAGS="${TAGS},${LOWER_IMAGE_NAME_DOCKER}:latest"
            elif [ "${{ github.ref }}" = "refs/heads/dev" ]; then
              TAGS="${TAGS},${LOWER_IMAGE_NAME_DOCKER}:dev"
            fi
          fi
          
          echo "TAGS=${TAGS}" >> $GITHUB_OUTPUT
          echo "Generated tags: ${TAGS}"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          push: true
          tags: ${{ steps.meta.outputs.TAGS }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            BUILDKIT_INLINE_CACHE=1