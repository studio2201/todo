[package]
name = "backend"
version = "1.2.1"
edition = "2021"
authors = ["UberMetroid <admin@ubermetroid.com>"]
license = "GPL-3.0-only"
repository = "https://github.com/UberMetroid/RustDo"
homepage = "https://github.com/UberMetroid/RustDo"
description = "Axum backend service for RustDo."
readme = "../README.md"

[dependencies]
shared = { path = "../shared" }
axum = { version = "0.7", features = ["macros"] }
tokio = { version = "1.35", features = ["full"] }
tower-http = { version = "0.5", features = ["fs", "cors"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tower = "0.4"
axum-extra = { version = "0.9", features = ["cookie"] }
dotenvy = "0.15"
sha2 = "0.10"
